name: Feature / Improvement
description: Capture a desired change or improvement.
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: markdown
    attributes:
      value: |
        Use this for a new capability, UI improvement, technical cleanup, or small product improvement.
        A full technical design is optional.
  - type: textarea
    id: change
    attributes:
      label: Problem or desired change
      description: What should change, and what is the current pain?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: What user or project value does this create?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What should be true when this is done?
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope, optional
      description: What should not be changed as part of this?
