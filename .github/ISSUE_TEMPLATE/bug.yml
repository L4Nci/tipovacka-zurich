name: Bug
description: Capture a problem in an existing feature.
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: |
        Keep it short. Add enough context for Codex or the owner to reproduce or understand the problem.
        Do not include secrets, API keys, passwords, or private production data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong?
      placeholder: "Example: The leaderboard total is lower than the visible sum of match points."
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where it happens
      description: Page, component, endpoint, cron, admin flow, or environment.
      placeholder: "Example: Leaderboard / production / mobile"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reproduction or evidence
      description: Steps, observed data, screenshot description, log excerpt, or why this is suspected.
      placeholder: |
        1. Open ...
        2. Compare ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: attachment
    attributes:
      label: Optional screenshot or log
      description: Attach or paste relevant evidence. Do not paste secrets.
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - P1 — core flow broken, release blocker, data trust, or serious production issue
        - P2 — important but not blocking
        - P3 — small, cosmetic, or backlog
    validations:
      required: true
