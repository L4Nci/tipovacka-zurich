name: Research
description: Capture a question or decision before implementation.
title: "[Research]: "
labels:
  - "type: research"
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What should be investigated or decided?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: What product, technical, safety, or maintenance concern depends on this?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Desired output
      description: Recommendation, comparison table, proof of concept, ADR, or follow-up Issues.
      placeholder: "Example: Recommendation with risks and next safe implementation step."
    validations:
      required: true
